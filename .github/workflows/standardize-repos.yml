name: Repository Standardization

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly on Sunday at 3 AM UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/repo-standards-validator.js'
      - 'scripts/sync-repo-metadata.js'
      - '.github/workflows/standardize-repos.yml'

permissions:
  contents: read

jobs:
  validate-standards:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate repository standards
        env:
          REPO_ROOT: ${{ github.workspace }}
        run: |
          echo "🔍 Running repository standards validation..."
          node scripts/repo-standards-validator.js
        continue-on-error: true

  analyze-metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Analyze repository metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          echo "📊 Analyzing repository metadata..."
          node scripts/sync-repo-metadata.js
        continue-on-error: true

  display-badges:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate badge examples
        run: |
          echo "🎨 Generating badge examples..."
          node scripts/generate-badges.js --examples
        continue-on-error: true

  generate-report:
    if: always()
    needs: [validate-standards, analyze-metadata, display-badges]
    runs-on: ubuntu-latest

    steps:
      - name: Report complete
        run: |
          echo "📋 Repository Standardization Check Complete"
          echo "✅ Standards validation finished"
          echo "✅ Metadata analysis finished"
          echo "✅ Badge generation finished"
